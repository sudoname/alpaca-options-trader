# nginx site for the Oracle dashboard — reverse proxy + HTTP Basic Auth + TLS.
#
# This droplet runs nginx (NOT Caddy) as the public face for its sites, with
# Let's Encrypt certs managed by certbot. The dashboard's Flask/waitress process
# binds 127.0.0.1:8787 (set in .env) and is NOT publicly reachable; nginx
# terminates TLS, enforces Basic Auth, and reverse-proxies to it. nginx is the
# sole public face — keep 8787 bound to localhost only.
#
# Install:
#   1. DNS A record:  oracle.lasgidi.ng -> <droplet public IP>
#   2. Create the password file (do NOT commit it):
#        sudo htpasswd -c /etc/nginx/.htpasswd-oracle oracle
#        sudo chown root:www-data /etc/nginx/.htpasswd-oracle
#        sudo chmod 640 /etc/nginx/.htpasswd-oracle
#   3. Install + enable this site (the plain listen-80 block below), then reload:
#        sudo cp deploy/nginx-oracle-dashboard.conf /etc/nginx/sites-available/oracle.lasgidi.ng
#        sudo ln -s ../sites-available/oracle.lasgidi.ng /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#   4. Provision TLS. certbot rewrites this file IN PLACE — it appends the
#      `listen 443 ssl` cert block and an HTTP->HTTPS 301 redirect (see the
#      commented "after certbot" result at the bottom). Do not hand-edit the
#      cert paths afterwards; certbot owns them.
#        sudo certbot --nginx -d oracle.lasgidi.ng

server {
    listen 80;
    server_name oracle.lasgidi.ng;

    # HTTP Basic Auth — defense-in-depth alongside the app-level check in
    # oracle_dashboard.py (which is off unless DASHBOARD_BASIC_AUTH_* are set).
    auth_basic "Oracle Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd-oracle;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

